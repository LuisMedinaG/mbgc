# pipeline.yml — Single workflow for all CI and deployment.
#
# On pull_request: detect changes → branch-check + selective build/test (no deploy)
# On push to dev:  build/test → deploy API to Cloud Run (dev)
# On push to main: build/test → deploy API to Cloud Run (prod) + web to Cloudflare Pages
# On workflow_dispatch: same as push on the selected branch
#
# Path filtering: on PRs, only changed paths trigger their CI job.
# Push/dispatch always runs all jobs for deploy gating.
# Infra lint lives in infra.yml (already path-filtered to infra/**).
#
# Required secrets: see docs/runbook/ci-cd/_index.md
# ref: ci-cd.PIPELINE.1
name: Pipeline

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: "--no-deprecation"

jobs:

  # ── Change detection ──────────────────────────────────────────────────────
  # On PRs: build jobs skip when their paths are unchanged (saves minutes).
  # On push/dispatch: all jobs run unconditionally (needed for deploy gating).
  # ref: ci-cd.PIPELINE.2
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    outputs:
      go:  ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - '**/go.sum'
              - 'go.work'
            web:
              - 'web/**'
            ios:
              - 'ios/**'

  # ── Branch gate (PR only) ─────────────────────────────────────────────────
  # Enforces: feature/* → dev only, dev → main only.
  # ref: ci-cd.BRANCH_GATE.1
  branch-check:
    name: Branch Rules
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - name: Enforce merge path
        run: |
          branch="${{ github.head_ref }}"
          target="${{ github.base_ref }}"
          if [ "$target" = "main" ]; then
            if [ "$branch" = "dev" ]; then
              echo "✓ dev → main allowed"
            else
              echo "✗ Only 'dev' can merge into 'main' (got '$branch')"
              echo "  Open a PR from '$branch' into 'dev' first."
              exit 1
            fi
          elif [ "$target" = "dev" ]; then
            if echo "$branch" | grep -qE '^(feature|fix|bug|chore|refactor|hotfix)/.+'; then
              echo "✓ '$branch' → dev allowed"
            else
              echo "✗ Branch '$branch' cannot merge into 'dev'"
              echo "  Rename to one of: feature/ fix/ bug/ chore/ refactor/ hotfix/"
              echo "  Example: feature/add-game-search"
              exit 1
            fi
          fi

  # ── Build & test ──────────────────────────────────────────────────────────
  # Go and Web run in parallel, each gated on path-change detection for PRs.

  # ref: ci-cd.BUILD.1
  go:
    name: Go
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.go == 'true' || github.event_name != 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Configure Go cache env
        run: |
          echo "GOCACHE=$HOME/.cache/go-build" >> $GITHUB_ENV
          echo "GOMODCACHE=$HOME/go/pkg/mod" >> $GITHUB_ENV
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: false
      - name: Fmt
        run: |
          if [ -n "$(gofmt -l . | tee /dev/stderr)" ]; then
            echo '::error::gofmt needs to be run (files listed above)'
            exit 1
          fi
      - name: Download modules
        run: go mod download -x
        working-directory: ${{ github.workspace }}
      - name: Lint (services/api)
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: services/api
          args: --timeout 5m
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./services/api/...
      - name: Build
        run: go build ./services/api/...
      - name: Test
        run: |
          go test -race ./services/api/... -coverprofile=coverage-api.out -covermode=atomic
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage-api.out >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Coverage threshold
        run: |
          pct=$(go tool cover -func=coverage-api.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "services/api coverage: ${pct}%"
          if [ "$(echo "$pct < 43" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${pct}% is below 43% threshold"
            exit 1
          fi
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage-api.out
          retention-days: 7
          if-no-files-found: ignore

  # ref: ci-cd.BUILD.2
  web:
    name: Web
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.15"
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            web/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install deps
        run: bun install --frozen-lockfile
        working-directory: web
      - name: Lint
        run: bun run lint
        working-directory: web
      - name: Audit dependencies
        run: bun audit --audit-level=moderate
      - name: Build
        run: bun run build
        working-directory: web
        env:
          VITE_API_BASE_URL: ""

  # ref: ci-cd.BUILD.3 — warnings are build-breaking (SWIFT_TREAT_WARNINGS_AS_ERRORS),
  # since Swift 6 strict-concurrency issues (actor isolation, Sendable) surface as
  # warnings or errors depending on settings and are easy to miss locally.
  ios:
    name: iOS
    runs-on: macos-15
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.ios == 'true' || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
        working-directory: ios
      - name: Build (warnings as errors)
        run: |
          xcodebuild build \
            -scheme MBGC \
            -destination 'generic/platform=iOS Simulator' \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
        working-directory: ios

  # ── Deploy (push/dispatch only, gated on build success) ───────────────────

  # ref: ci-cd.DEPLOY_API.8
  # Separate stub job required: GitHub Actions does not support `environment:` on reusable-workflow
  # caller jobs (jobs with `uses:`). This job holds the manual approval gate; deploy-api-prod
  # depends on it so the approval fires before any migration or deploy step runs.
  approve-prod:
    name: Approve → prod
    runs-on: ubuntu-24.04
    needs: [go, web]
    if: github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: production
    steps:
      - run: echo "Production deploy approved"

  # ref: ci-cd.DEPLOY_API.1
  deploy-api-prod:
    name: Deploy API → prod
    needs: [go, approve-prod]
    if: github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/deploy-cloud-run.yml
    with:
      service_name: mbgc-api
      dockerfile: services/api/deploy/Dockerfile
      context: .
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SA_API }}
      DATABASE_URL: ${{ secrets.API_DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.API_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.API_SUPABASE_SERVICE_ROLE_KEY }}
      ALLOWED_ORIGIN: ${{ secrets.API_ALLOWED_ORIGIN }}
      SEED_ADMIN_EMAIL: ${{ secrets.API_SEED_ADMIN_EMAIL }}
      SEED_ADMIN_PASSWORD: ${{ secrets.API_SEED_ADMIN_PASSWORD }}
      SEED_ADMIN_USERNAME: ${{ secrets.API_SEED_ADMIN_USERNAME }}

  # ref: ci-cd.DEPLOY_API.2
  deploy-api-dev:
    name: Deploy API → dev
    needs: go
    if: github.ref_name == 'dev' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/deploy-cloud-run.yml
    with:
      service_name: mbgc-api-dev
      dockerfile: services/api/deploy/Dockerfile
      context: .
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SA_API_DEV }}
      DATABASE_URL: ${{ secrets.DEV_API_DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.DEV_API_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_API_SUPABASE_SERVICE_ROLE_KEY }}
      ALLOWED_ORIGIN: ${{ secrets.DEV_API_ALLOWED_ORIGIN }}
      SEED_ADMIN_EMAIL: ${{ secrets.DEV_API_SEED_ADMIN_EMAIL }}
      SEED_ADMIN_PASSWORD: ${{ secrets.DEV_API_SEED_ADMIN_PASSWORD }}
      SEED_ADMIN_USERNAME: ${{ secrets.DEV_API_SEED_ADMIN_USERNAME }}

  # ref: ci-cd.DEPLOY_WEB.1
  # deploy-web rebuilds with the real VITE_API_BASE_URL (a repository variable) rather
  # than the empty string used in the web CI job. Vite bakes env vars into the bundle
  # at build time, so the two builds cannot share an artifact.
  deploy-web:
    name: Deploy Web → prod
    needs: web
    timeout-minutes: 15
    if: github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.15"
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            web/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install deps
        run: bun install --frozen-lockfile
        working-directory: web
      - name: Build
        run: bun run build
        working-directory: web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=mbgc-web --branch=main

  # ref: ci-cd.DEPLOY_API.8 — notify merged PR with link to prod approval gate
  notify-prod-approval:
    name: Notify → prod approval
    runs-on: ubuntu-24.04
    needs: [go, web]
    if: github.ref_name == 'main' && github.event_name == 'push'
    permissions:
      pull-requests: write
    steps:
      - name: Comment approval link on merged PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          pr=$(gh api "repos/${GH_REPO}/commits/${SHA}/pulls" --jq '.[0].number // empty')
          if [ -z "$pr" ]; then
            echo "No PR associated with ${SHA} — skipping."
            exit 0
          fi
          gh pr comment "$pr" --body "$(cat <<EOF
          ### Prod release ready for approval

          CI passed. Approve the production deployment below:

          **[→ Approve prod deploy](${RUN_URL})**

          > Open the **Approve → prod** job and click **Review deployments**.
          EOF
          )"
          echo "Posted approval link to PR #${pr}"
