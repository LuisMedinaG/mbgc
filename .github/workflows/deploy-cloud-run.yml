# deploy-cloud-run.yml — Reusable workflow: build Docker image and deploy to Cloud Run.
# Called by pipeline.yml (deploy-api-prod / deploy-api-dev jobs). Not triggered directly.
#
# Steps: GCP auth via Workload Identity Federation → docker buildx + push to Artifact Registry
#        (tagged with commit SHA, GHA layer cache) → gcloud run deploy with non-empty env vars.
# Migrations run at server startup via golang-migrate (embedded SQL, tracked in schema_migrations).
# ref: ci-cd.DEPLOY_API.4, ci-cd.DEPLOY_API.5, ci-cd.DEPLOY_API.6, ci-cd.DEPLOY_API.7
name: Deploy to Cloud Run

on:
  workflow_call:
    inputs:
      service_name:
        description: Cloud Run service name (must match Terraform-managed service).
        required: true
        type: string
      region:
        description: GCP region.
        required: false
        type: string
        default: us-central1
      dockerfile:
        description: Path to Dockerfile.
        required: false
        type: string
        default: Dockerfile
      context:
        description: Docker build context.
        required: false
        type: string
        default: .
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      GCP_PROJECT_ID:
        required: true
      GCP_RUNTIME_SERVICE_ACCOUNT:
        required: true
      DATABASE_URL:
        required: true
      SUPABASE_URL:
        required: true
      SUPABASE_SERVICE_ROLE_KEY:
        required: false
      ALLOWED_ORIGIN:
        required: false
      SEED_ADMIN_EMAIL:
        required: false
      SEED_ADMIN_PASSWORD:
        required: false
      SEED_ADMIN_USERNAME:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      IMAGE: ${{ inputs.region }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mbgc/${{ inputs.service_name }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      # Buildx required for GHA layer cache backend (type=gha).
      - uses: docker/setup-buildx-action@v3

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          # Build --update-env-vars, skipping optional secrets that are empty
          # to avoid overwriting existing Cloud Run env vars with blank values.
          _env=""
          _add() { if [ -n "$2" ]; then _env="${_env:+$_env,}$1=$2"; fi; }
          _add PORT                   "8080"
          _add DATABASE_URL              "$DATABASE_URL"
          _add SUPABASE_URL              "$SUPABASE_URL"
          _add SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY"
          _add ALLOWED_ORIGIN            "$ALLOWED_ORIGIN"
          _add SEED_ADMIN_EMAIL          "$SEED_ADMIN_EMAIL"
          _add SEED_ADMIN_PASSWORD       "$SEED_ADMIN_PASSWORD"
          _add SEED_ADMIN_USERNAME       "$SEED_ADMIN_USERNAME"
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT" \
            --service-account "$RUNTIME_SA" \
            ${_env:+--update-env-vars "$_env"} \
            --verbosity=warning
        env:
          SERVICE: ${{ inputs.service_name }}
          REGION: ${{ inputs.region }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          RUNTIME_SA: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
          SEED_ADMIN_EMAIL: ${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
          SEED_ADMIN_USERNAME: ${{ secrets.SEED_ADMIN_USERNAME }}
