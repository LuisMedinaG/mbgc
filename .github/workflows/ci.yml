name: CI

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev, staging, main]

permissions:
  contents: read

jobs:
  go-build:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Build
        run: |
          go build ./pkg/shared/...
          go build ./services/api/...

      - name: Test
        run: |
          go test ./pkg/shared/... -cover
          go test ./services/api/... -cover

      - name: Vet
        run: |
          go vet ./pkg/shared/...
          go vet ./services/api/...

  web-build:
    name: Web Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Lint
        run: bun run lint
        working-directory: web
        continue-on-error: true

      - name: Build
        run: bun run build
        working-directory: web
        env:
          VITE_API_BASE_URL: ""

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps
        working-directory: web

      - name: Run E2E tests
        run: bunx playwright test --project=chromium
        working-directory: web
        env:
          CI: true
          # No TEST_TOKEN → all tests run in mocked mode (no backend required)

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  infra-lint:
    name: Infra Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Terraform fmt
        run: terraform fmt -check -recursive infra/

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.52.0

      - name: TFLint
        run: tflint --recursive --format=compact --only=terraform_deprecated_interpolation --only=terraform_unused_declarations
        working-directory: infra
        continue-on-error: true
