# e2e.yml — Manual Playwright end-to-end tests against a live environment.
# Triggered via workflow_dispatch only — not part of the automatic CI pipeline.
# Caller selects the target branch, browser, and base URL. Uploads playwright-report on failure.
# ref: ci-cd.E2E.1, ci-cd.E2E.2, ci-cd.E2E.3
name: E2E

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to test
        required: false
        default: dev
      browser:
        description: Browser
        required: false
        default: chromium
        type: choice
        options: [chromium, firefox]
      base_url:
        description: Base URL for tests (defaults to dev environment)
        required: false
        default: https://mbgc-api-dev-[your-project].run.app

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.15"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            web/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: bunx playwright install ${{ inputs.browser }} --with-deps
        working-directory: web

      - name: Run E2E tests
        run: bunx playwright test --project=${{ inputs.browser }}
        working-directory: web
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
