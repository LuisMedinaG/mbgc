name: E2E

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to test
        required: false
        default: staging
      browser:
        description: Browser
        required: false
        default: chromium
        type: choice
        options: [chromium, firefox]

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Install Playwright browsers
        run: bunx playwright install ${{ github.event.inputs.browser }} --with-deps
        working-directory: web

      - name: Run E2E tests
        run: bunx playwright test --project=${{ github.event.inputs.browser }}
        working-directory: web
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
