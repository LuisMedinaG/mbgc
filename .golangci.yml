version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - staticcheck
    - errcheck
    - govet
    - revive
  exclusions:
    paths:
      - vendor
    rules:
      - linters: [errcheck]
        text: 'error return value not checked.*(Close|Write|Flush)\('

formatters:
  enable:
    - gofmt
