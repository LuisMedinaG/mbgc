<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}My Board Game Collection{{end}}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 0 auto; padding: 1rem; }
    nav { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid #ddd; padding-bottom: 1rem; }
    .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
    .game-card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; }
    .game-card img { width: 100%; height: 150px; object-fit: contain; }
    input, select, button { padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd; }
    button { background: #4a90d9; color: white; cursor: pointer; border: none; }
    button:hover { background: #357abd; }
    .error { color: red; }
  </style>
</head>
<body>
{{block "content" .}}{{end}}
</body>
</html>
