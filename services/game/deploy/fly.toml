app = "mbgc-game-service"
primary_region = "iad"

[build]
  dockerfile = "deploy/Dockerfile"

[http_service]
  internal_port = 8002
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "10s"
    timeout  = "2s"
    grace_period = "5s"
    method = "GET"
    path   = "/healthz"

[mounts]
  source = "mbgc_game_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  PORT    = "8002"
  DATA_DIR = "/data/uploads"
