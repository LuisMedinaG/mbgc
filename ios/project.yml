name: MBGC
options:
  bundleIdPrefix: app.lumedina
  deploymentTarget:
    iOS: "26.0"
configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig
settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
targets:
  MBGC:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: MBGC
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lumedina.mbgc
        DEVELOPMENT_TEAM: T9YNQ73MS3
        CODE_SIGN_STYLE: Automatic
    info:
      path: MBGC/Info.plist
      properties:
        CFBundleDisplayName: MBGC
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        BGGToken: $(BGG_TOKEN)
  MBGCTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MBGCTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MBGC
schemes:
  MBGC:
    build:
      targets:
        MBGC: all
        MBGCTests: [test]
    test:
      targets:
        - MBGCTests
    run:
      config: Debug
