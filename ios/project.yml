name: MBGC
options:
  bundleIdPrefix: app.lumedina
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
targets:
  MBGC:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MBGC
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lumedina.mbgc
    info:
      path: MBGC/Info.plist
      properties:
        CFBundleDisplayName: MBGC
        UILaunchScreen: {}
  MBGCTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MBGCTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MBGC
schemes:
  MBGC:
    build:
      targets:
        MBGC: all
        MBGCTests: [test]
    test:
      targets:
        - MBGCTests
    run:
      config: Debug
