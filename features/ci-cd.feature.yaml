# ci-cd.feature.yaml — CI/CD Pipeline
feature:
  name: ci-cd
  product: mbgc
  description: |
    GitHub Actions pipeline for continuous integration and deployment.
    A single pipeline.yml workflow handles all CI and deploy concerns.
    CI (build/test/lint) runs on every PR. Deployment runs on push to dev
    or main after CI passes. Infra (Terraform) is managed separately.

components:
  PIPELINE:
    name: Pipeline structure
    description: Single workflow file as the source of truth for CI and deploy
    requirements:
      1: All CI and deploy jobs live in .github/workflows/pipeline.yml
      2: PRs trigger branch-check + build/test only — no deployments on PRs
      3: Push to dev triggers build/test then deploy to the dev environment
      4: Push to main triggers build/test then deploy to the prod environment
      5: workflow_dispatch allows manual re-run of the full pipeline on any branch

  BRANCH_GATE:
    name: Branch name enforcement
    description: PRs must follow the project merge path rules
    requirements:
      1: Only dev → main PRs are allowed; any other source branch targeting main is rejected
      2: PRs targeting dev must use a prefix of feature/, fix/, bug/, chore/, refactor/, or hotfix/
      3: Rejection messages include the corrective action the developer should take

  BUILD:
    name: Build and test
    description: All code is built, tested, and linted before merging or deploying
    requirements:
      1: Go — builds pkg/shared + services/api, runs tests with -cover, runs go vet
      2: Web — runs bun run lint and bun run build
      3: Infra — runs terraform fmt -check and tflint --recursive
      4: All three build jobs run in parallel on every push and PR

  DEPLOY_API:
    name: API deployment
    description: Go API is deployed to Cloud Run after the go job succeeds on push
    requirements:
      1: Push to main deploys mbgc-api (prod) to Cloud Run after go job succeeds
      2: Push to dev deploys mbgc-api-dev (dev) to Cloud Run after go job succeeds
      3: Deployments are skipped on PRs — only triggered by push and workflow_dispatch
      4: Docker image is tagged with the commit SHA for traceability
      5: Empty optional secrets (SEED_ADMIN_*) are omitted from --update-env-vars to avoid overwriting existing Cloud Run values
      6: GCP auth uses Workload Identity Federation — no service account key files stored in GitHub
      7: Database migrations run via psql before the Cloud Run deploy on every push — all SQL is idempotent (IF NOT EXISTS / CREATE OR REPLACE)

  DEPLOY_WEB:
    name: Web deployment
    description: React frontend is deployed to Cloudflare Pages after the web job succeeds on push to main
    requirements:
      1: Push to main builds and deploys web/dist to Cloudflare Pages (project mbgc-web, branch main)
      2: Dev pushes do not deploy the web — only the API is updated on dev pushes
      3: VITE_API_BASE_URL is sourced from GitHub Actions vars (not secrets) for the production build

  INFRA:
    name: Infrastructure management
    description: Terraform manages GCP Cloud Run, Cloudflare DNS/Pages, and Supabase resources
    requirements:
      1: PRs targeting main with infra/ changes run terraform plan and post the output as a PR comment
      2: Merges to main with infra/ changes run terraform apply automatically
      3: Terraform version is pinned (1.14.8) for reproducible runs
      4: GCP auth uses Workload Identity Federation — no key files

  E2E:
    name: End-to-end tests
    description: Playwright browser tests run on demand against a live environment
    requirements:
      1: E2E tests are triggered manually (workflow_dispatch) — not on every push
      2: Caller selects the target branch and browser (chromium or firefox)
      3: Playwright report is uploaded as an artifact on failure for debugging
