# game-detail.feature.yaml — Game Detail Page
feature:
  name: game-detail
  product: mbgc
  description: |
    Individual game detail view showing metadata, player aids,
    collection assignments (vibes), rulebook URL, and delete action.

components:
  DETAIL_VIEW:
    name: Game detail display
    description: Full game detail page at /games/:id
    requirements:
      1: Fetches single game from GET /api/v1/games/{id} including collections and player aids
      2: Renders full game metadata — hero image, name, year, player count, playtime, weight, rating, description (expandable), type/category/mechanic chips, language dependence, recommended player counts

  PLAYER_AIDS:
    name: Player aid image management
    description: Upload, view, and delete player aid reference images per game
    requirements:
      1: Upload images (PNG, JPEG, GIF, WebP) via POST /api/v1/games/{id}/player-aids; delete via DELETE endpoint; stored on disk in a configurable data directory
      2: Thumbnails shown in a horizontal strip; clicking opens a full-screen lightbox with arrow key and Escape navigation
      3: Uploads are size-limited and validated for image MIME type before saving

  RULES_URL:
    name: Rulebook URL editor
    description: Inline editor for storing and validating Google Drive rulebook links
    requirements:
      1: Inline edit/save/cancel via PUT /api/v1/games/{id}/rules-url; displays current URL if set; no page navigation
      2: "Validates URL — must be https://drive.google.com/ or https://docs.google.com/; shows inline error for invalid URLs"

  VIBE_ASSIGN:
    name: Vibe assignment
    description: Assign/remove game from collections on the detail page
    requirements:
      1: Checklist of all user collections with current checkbox state; saving calls POST /api/v1/games/{id}/collections with the full collection ID set; UI reflects changes immediately

  DELETE:
    name: Delete game
    description: Remove a game from the user's collection
    requirements:
      1: DELETE /api/v1/games/{id} with user_id ownership check; requires confirmation before executing
      2: On success, navigates to the collection page; DB cascade-deletes player aids and collection assignments
