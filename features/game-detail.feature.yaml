# game-detail.feature.yaml — Game Detail Page
feature:
  name: game-detail
  product: mbgc
  description: View and manage a single board game from the user's collection

components:
  DETAIL_VIEW:
    name: Game detail
    description: Display all metadata for a single game
    requirements:
      1: GET /api/v1/games/{id} returns full game metadata including collections and player aids
      2: The page displays name, image, year, player count, playtime, weight, rating, and description
      3: The description is expandable when truncated
      4: Category, mechanic, and type chips are shown
      5: Requesting a game the user does not own returns 404

  PLAYER_AIDS:
    name: Player aids
    description: Reference images attached to a game
    requirements:
      1: Images can be uploaded via POST /api/v1/games/{id}/player-aids
      2: Images can be deleted individually
      3: Uploaded files are validated for image type and maximum size before saving
      4: Images are displayed as thumbnails; clicking opens a full-screen lightbox
      5: The lightbox supports keyboard navigation (arrows, Escape)

  RULES_URL:
    name: Rulebook link
    description: Store a link to the game's rulebook
    requirements:
      1: The rulebook URL can be set and updated inline without navigating away
      2: Only Google Drive and Google Docs URLs are accepted
      3: An invalid URL shows an inline error without saving

  VIBE_ASSIGN:
    name: Collection assignment
    description: Assign or remove the game from collections
    requirements:
      1: A checklist shows all user collections with their current assignment state
      2: Saving replaces the full set of collection assignments for the game
      3: The UI reflects the updated state immediately after saving

  DELETE:
    name: Delete game
    description: Remove a game from the collection
    requirements:
      1: Deleting a game requires explicit user confirmation
      2: The requesting user must own the game; otherwise 403 is returned
      3: Deletion removes all associated player aids and collection assignments
      4: After deletion the user is navigated back to the collection page
