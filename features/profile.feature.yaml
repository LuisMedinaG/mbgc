# profile.feature.yaml — Profile Management
feature:
  name: profile
  product: mbgc
  description: User profile and account settings management

components:
  VIEW:
    name: View profile
    description: Display user account information
    requirements:
      1: GET /api/v1/profile returns the user's profile, creating it on first access if absent
      2: The profile displays the username and configured BGG username

  BGG_USERNAME:
    name: BGG username
    description: Configure the BoardGameGeek username used for sync
    requirements:
      1: The BGG username can be set, updated, or cleared via PUT /api/v1/profile/bgg-username
      2: The BGG username is required for BGG sync to function

  CHANGE_PASSWORD:
    name: Change password
    description: Update the account password
    requirements:
      1: The user provides their current and new password to change it
      2: The new password must meet a minimum length requirement
      3: Success shows a confirmation; failure shows an error without internal details

  ADMIN:
    name: Admin role
    description: Elevated privileges for admin users
    requirements:
      1: Admin status is stored in the user profile and reflected in the JWT
      2: Admin users have elevated BGG sync rate limits
      3: Only admins can trigger full-refresh BGG syncs

constraints:
  SEC:
    name: Security constraints
    requirements:
      1: Passwords are never logged
      2: BGG username is sanitized before storage
