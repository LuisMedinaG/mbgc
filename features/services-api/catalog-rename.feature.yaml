feature:
    name: catalog-rename
    product: services-api
    description: Rename the `internal/game` package to `internal/catalog` so the package name reflects what it actually owns (the full catalog domain: games, collections, player aids, BGG data, discover). Closes #59.

constraints:
    PACKAGE_NAMING:
        description: The package owns multiple domains (games, collections, player aids, discover). The current name `game` misleads readers because it does not describe the full surface.
        requirements:
            1: The directory `services/api/internal/game/` is renamed to `services/api/internal/catalog/`
            2: The Go package name in every file in that directory changes from `game` to `catalog`
            3: Every external import path `github.com/LuisMedinaG/mbgc/services/api/internal/game` becomes `.../internal/catalog`
            4: Every external reference `game.Store`, `game.NewStore`, `game.NewHandler`, `game.Handler`, `game.BGGGameData`, `game.GameFilter`, `game.Game`, `game.Collection`, `game.PlayerAid`, `game.DiscoverFilter` becomes `catalog.<X>`
            5: Local variable names that embed the old domain (`gameStore`, `gameHandler`) are renamed to `catalogStore`, `catalogHandler` for consistency
            6: Test function names that refer to handler methods (`TestListGames_*`, `TestGetGame_*`, etc.) are NOT renamed — they test the handler, not the package

    NON_BEHAVIORAL:
        description: This is a pure refactor — no public API, route, SQL, or behavior change.
        requirements:
            1: HTTP route paths (`/api/v1/games/*`, `/api/v1/collections/*`, `/api/v1/discover`) are unchanged
            2: JSON request/response shapes are unchanged
            3: SQL tables and column names are unchanged
            4: `go test -v -race ./...` passes with no test edits other than mechanical package-name updates
            5: `services/api/AGENTS.md` is updated: route-table column changes from `game.X` to `catalog.X`; package-layout line changes from `internal/game/` to `internal/catalog/`; coverage line changes from `game 61%` to `catalog 61%`
