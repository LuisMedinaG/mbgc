# vibes.feature.yaml — Collections ("Vibes") Management
feature:
  name: vibes
  product: mbgc
  description: Custom named collections for organizing games into themes or moods

components:
  LIST:
    name: List collections
    description: Browse all collections the user has created
    requirements:
      1: GET /api/v1/collections returns all collections for the authenticated user
      2: Each collection displays its name, color, and game count

  CRUD:
    name: Manage collections
    description: Create, rename, and delete collections
    requirements:
      1: A collection can be created with a name
      2: Duplicate collection names per user are rejected with a conflict error
      3: A collection can be renamed
      4: A collection can be deleted
      5: Deleting a collection removes all of its game assignments

  ASSIGN:
    name: Assign games to collections
    description: Add or remove a game from one or more collections
    requirements:
      1: Assigning a game sets the full collection membership for that game
      2: Assigned collections are visible as pills on game list items

  DISCOVER:
    name: Browse by collection
    description: View games within a specific collection
    requirements:
      1: GET /api/v1/discover returns games filtered by collection ID
      2: Supports the same filter parameters as the main game list
      3: Response includes total count matching the filtered query
