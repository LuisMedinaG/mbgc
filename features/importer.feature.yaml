# importer.feature.yaml — BGG Sync & CSV Import
feature:
  name: importer
  product: mbgc
  description: Import board games into the collection from BoardGameGeek via API or CSV

components:
  BGG_SYNC:
    name: BGG sync
    description: Pull games directly from the user's BoardGameGeek account
    requirements:
      1: POST /api/v1/import/sync fetches the user's BGG collection using their configured BGG username
      2: Sync is disabled when BGG credentials are not configured on the server
      3: Regular users are limited to 3 syncs per day
      4: Admin users are limited to 20 syncs per day
      5: Rate limits reset daily at midnight UTC
      6: Each sync is recorded with user, game counts, and timestamp
      7: The response includes counts of imported, skipped, and failed games
      8: Admins can trigger a full refresh that re-imports all games, not just new ones

  CSV_IMPORT:
    name: CSV import
    description: Import games from a BGG-exported CSV file
    requirements:
      1: A CSV file is uploaded for preview before import is confirmed
      2: The preview shows game names and marks which games are already in the collection
      3: The user selects which games to import from the preview list
      4: Importing skips games already present in the user's collection
      5: The response includes counts of imported, skipped, and failed games

  GAME_CREATION:
    name: Game record creation
    description: How game records are stored on import
    requirements:
      1: Each imported game is scoped to the importing user's ID
      2: Importing the same BGG game twice does not create a duplicate

constraints:
  RATE:
    name: Rate limiting
    requirements:
      1: Rate limit state is persisted per user between requests
      2: Admin users can bypass rate limits for full-refresh operations
