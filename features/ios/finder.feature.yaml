feature:
  name: finder
  product: ios
  description: Guide the user through lightweight questions to recommend games from the local library.

components:
  FLOW:
    requirements:
      1: The finder starts from the user's locally stored games.
      1-1: The finder can start when locally stored games exist without requiring user-created collections or vibes.
      2: The finder presents one decision question per carousel page.
      3: The finder skips a question automatically when it has no available options.
      4: The finder keeps enough state to move through the flow without losing prior answers.
      5: The finder lets users navigate between question pages and results by swiping.
      6: The finder lets users change or clear a prior answer and updates later question state from that answer.
      7: The finder provides a visual affordance that the question flow is horizontally paged.
      8: The finder makes selected answers visually distinct from unselected answers.
      9: Finder question and result content uses the available bottom space while clearing system controls.
      10: The finder advances to the next carousel page after a new answer is selected.
      11: The finder lets users exit an active question flow back to the start screen.
      12: The finder hides home navigation chrome during an active question flow.
  QUESTIONS:
    requirements:
      1: The finder can narrow games by collection or vibe.
      2: The finder can narrow games by supported player count.
      3: The finder can narrow games by playtime bucket.
      4: The finder can narrow games by game type when type metadata exists.
  RESULTS:
    requirements:
      1: The finder shows only games that match the selected answers.
      2: The finder ranks matching games with deterministic local signals.
      3: Finder results open the matching local game detail view.
      4: The finder explains when no local games match the selected answers.

constraints:
  LOCAL_FIRST:
    requirements:
      1: Finder behavior uses only local SwiftData state.
      2: Finder ranking rules are covered by unit tests.
  VISUAL:
    requirements:
      1: Finder screens use the app's shared plain background surface.
