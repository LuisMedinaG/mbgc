feature:
  name: bgg-import
  product: ios
  description: Import a user's owned BoardGameGeek games into the local iOS library.

components:
  SYNC:
    requirements:
      1: The app imports owned BGG item IDs for a username from the public XML API.
      2: The app fetches metadata only for BGG IDs that are not already stored locally.
      3: The app adds only newly imported games to the selected local collection.
      4: The app defaults to local-first behavior and does not call the MBGC backend.
      5: The app shows user-visible progress for each major import step.
  LIMITS:
    requirements:
      1: A regular local BGG sync imports at most 100 new games.
      2: A regular local BGG sync can run at most once per 7 days when it imports new games.
      3: Admin rebuild and larger import limits are deferred until real authenticated admin support exists.

constraints:
  SECURITY:
    requirements:
      1: The app stores no BGG password, backend JWT, or admin override for BGG import.
      2: The app uses BGG's public XML API with conservative retry behavior for queued or throttled responses.
      3: The app explains BGG authentication failures without exposing raw transport errors.
      4: The app stores a user-provided BGG API token only in Keychain.
