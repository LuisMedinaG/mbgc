# auth.feature.yaml — Authentication & Authorization
feature:
  name: auth
  product: mbgc
  description: Supabase-based authentication with JWT verification and multi-tenancy enforcement

components:
  JWT_VALIDATION:
    name: JWT validation
    description: Every API request must carry a valid Supabase-issued JWT
    requirements:
      1: All protected routes reject requests with a missing or malformed Authorization header with 401
      2: The server validates the JWT signature against Supabase JWKS on every request
      3: Expired tokens are rejected with 401
      4: Tokens with an invalid issuer or audience are rejected with 401
      5: Unauthenticated API keys (anon, service_role) are rejected with 401
      6: JWKS keys are refreshed automatically when keys rotate

  MULTI_TENANCY:
    name: Data isolation
    description: Each user can only access their own data
    requirements:
      1: Every query on user-owned data is scoped by the authenticated user's ID
      2: Mutating a resource owned by another user returns 403
      3: User identity is derived from the validated JWT, never from request headers

  LOGIN:
    name: Login
    description: Email and password login flow
    requirements:
      1: The login page accepts email and password
      2: Successful login redirects the user to their collection
      3: Failed login shows an error without revealing whether the email exists
      4: Tokens are stored client-side on successful login

  TOKEN_REFRESH:
    name: Token refresh
    description: Seamless token renewal without user interruption
    requirements:
      1: A 401 response automatically triggers a token refresh attempt
      2: The original request is retried after a successful refresh
      3: Concurrent refresh attempts are coalesced into a single request
      4: If refresh fails, stored tokens are cleared and the user is redirected to login

  MIDDLEWARE:
    name: HTTP middleware
    description: Cross-cutting concerns applied to all API requests
    requirements:
      1: Every request is logged with method, path, status, and latency
      2: Every request receives a unique request ID
      3: Unhandled panics return 500 without leaking internal details
      4: CORS is enforced against the configured allowed origin
      5: Security headers are set on every response

constraints:
  SEC:
    name: Security constraints
    requirements:
      1: Access tokens must never appear in URL query parameters
      2: All tokens are cleared from client storage on logout and on auth failure
      3: The server ignores user identity headers (X-User-ID, X-Username, X-Is-Admin) from callers
