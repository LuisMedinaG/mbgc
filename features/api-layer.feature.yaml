# api-layer.feature.yaml — API Infrastructure
feature:
  name: api-layer
  product: mbgc
  description: Server startup requirements and consistent API response conventions

components:
  CONFIG:
    name: Server configuration
    description: Environment-variable-driven configuration with required vs optional semantics
    requirements:
      1: DATABASE_URL is required; the server refuses to start if absent
      2: SUPABASE_URL is required; the server refuses to start if absent
      3: PORT defaults to 8080 if not set
      4: ALLOWED_ORIGIN defaults to http://localhost:5173 if not set
      5: BGG sync is disabled when BGG credentials are not configured
      6: Sync rate limits are configurable per role (user and admin)

  RESPONSES:
    name: API response conventions
    description: All API responses follow a consistent envelope structure
    requirements:
      1: Successful responses wrap data in a shared envelope
      2: Error responses return a structured error code and human-readable message
      3: Internal error details are never exposed to API clients
      4: Database and internal errors are logged server-side but not returned to callers

constraints:
  SEC:
    name: Security hardening
    description: Server-level security protections against common attack vectors
    requirements:
      1: All outbound HTTP calls use a shared client with a 10-second timeout — never http.DefaultClient
      2: Auth endpoints (login, refresh, logout) are rate-limited per IP (5 req/s, burst 10) to prevent brute-force
      3: Request body size is capped at 1MB globally to prevent memory exhaustion
      4: Search and filter query parameters are truncated to 255 characters to prevent abuse
