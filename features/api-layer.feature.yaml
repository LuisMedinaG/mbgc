# api-layer.feature.yaml — Shared API Infrastructure
feature:
  name: api-layer
  product: mbgc
  description: |
    Shared Go library (pkg/shared) and server configuration.
    Covers startup requirements and cross-cutting coding conventions.

components:
  CONFIG:
    name: Server configuration
    description: Environment-variable-driven configuration with required-vs-optional semantics
    requirements:
      1: DATABASE_URL is required — server panics at startup if missing
      2: SUPABASE_URL is required — server panics at startup if missing
      3: PORT defaults to 8080 if not set
      4: "ALLOWED_ORIGIN defaults to http://localhost:5173 if not set"
      5: BGG_TOKEN and BGG_COOKIE are optional; importer disables sync if absent
      6: SYNC_LIMIT_USER defaults to 3; SYNC_LIMIT_ADMIN defaults to 20

constraints:
  CODE:
    name: Coding conventions
    description: Non-negotiable patterns enforced across all Go services
    requirements:
      1: All Go code uses slog for structured logging — never log.Printf or fmt.Println
      2: Raw err.Error() is never returned to HTTP clients — only apierr sentinels
      3: All API responses use WriteJSON/WriteError and the envelope types from pkg/shared
      4: User identity is always extracted via httpx.UserIDFromContext — never from request headers
