# collection.feature.yaml — Board Game Collection (Browse & Filter)
feature:
  name: collection
  product: mbgc
  description: |
    Main board game collection page with list/grid views,
    full-text search, and multi-faceted filtering.

components:
  GAME_LIST:
    name: Game list/grid display
    description: Fetches and displays the user's board game collection
    requirements:
      1: Fetches games from GET /api/v1/games with pagination (page/limit); backend returns total count
      2: Supports list view and grid view; view mode persisted in localStorage
      3: Shows loading skeleton while fetching, empty state when no games match, error message on failure

  FILTERS:
    name: Game filters
    description: Filter by search, category, players, playtime, and weight
    requirements:
      1: Search input debounced at 300ms before triggering API call
      2: "Dropdowns filter by: category (BGG type/category/mechanic), player count ranges, playtime ranges, weight/complexity"
      3: Active filters shown as removable chips below the filter bar; removing a chip resets that filter

  API:
    name: Backend API
    description: Server-side game listing and full-text search
    requirements:
      1: "GET /api/v1/games accepts search, category, page, limit; results scoped to user_id; returns game metadata with assigned collections"
      2: Full-text search uses ts_rank with to_tsvector on search_vector; endpoint also returns distinct categories for filter dropdowns

constraints:
  PERF:
    name: Performance
    requirements:
      1: Client-side filter results are memoized (useMemo); search is debounced; images use lazy loading with fallback placeholder
