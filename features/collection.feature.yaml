# collection.feature.yaml — Board Game Collection
feature:
  name: collection
  product: mbgc
  description: Browse, search, and filter the user's board game collection

components:
  DISPLAY:
    name: Collection display
    description: View the collection as a list or grid
    requirements:
      1: The page displays the user's games with pagination
      2: Games can be shown in list view or grid view
      3: View mode is persisted across sessions
      4: The page shows a loading state while fetching
      5: The page shows an empty state when no games match

  SEARCH:
    name: Search and filter
    description: Narrow the collection by text or game attributes
    requirements:
      1: A text search filters games by name
      2: Games can be filtered by category, player count, playtime, and weight
      3: Active filters are shown as removable chips below the filter bar
      4: Removing a chip resets that filter
      5: Search input is debounced before triggering a request

  API:
    name: Backend game list API
    description: Server-side game listing with filtering and pagination
    requirements:
      1: GET /api/v1/games returns the authenticated user's games
      2: Accepts search, category, player count, playtime, and weight filter parameters
      3: Supports page and limit parameters; response includes total count
      4: Full-text search is supported server-side
